services:
  postgres:
    image: postgres:16-alpine
    container_name: wordpicmemo-postgres
    environment:
      POSTGRES_USER: wordpicmemo
      POSTGRES_PASSWORD: wordpicmemo_dev
      POSTGRES_DB: wordpicmemo
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wordpicmemo']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wordpicmemo-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
